  test_e2e_api:
    name: End-to-end api testing
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build
          path: packages

      - name: Clean install
        run: npm ci

      - name: Initialize docker
        run: npm run docker:init

      - name: Start MongoDB container
        run: npm run mongodb:start

      - name: Start DynamoDB container
        run: npm run dynamodb:start

      - name: Start detached dev server
        run: DEBUG=*:ERROR,*:INFO node packages/api-dev-server/out/server/index.mjs > dev-server.log 2>&1 &

      - name: Wait for dev server to be reachable
        run: npx wait-port localhost:4010 -t 15000

      - name: Run end-to-end tests
        run: npm run -w api test:e2e:run

      - name: Stop dev server
        run: kill $(lsof -t -i:4010) || true

      - name: Upload dev server logs
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: dev_server_logs
          path: |
            dev-server.log
          retention-days: 2
