name: CI up to ci:test

on:
  push:
    branches: ['ci']
  pull_request:
    branches: ['ci']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  APP_ORIGIN: http://localhost
  VITE_GRAPHQL_HTTP_URL: http://localhost:4010/graphql
  VITE_GRAPHQL_WS_URL: ws://localhost:4010/graphql
  DEBUG_FORMAT: json
  MOCK_MONGODB_URI: mongodb://localhost:27017/notesTest?replicaSet=rs0
  MOCK_DYNAMODB_ENDPOINT: http://localhost:8000
  MONGODB_TIER: enterprise
  VITE_MOCK_GOOGLE_AUTH: true
  TEST_MONGODB_URI: mongodb://localhost:27017/notesTest?replicaSet=rs0
  TEST_DYNAMODB_ENDPOINT: http://localhost:8000
  TEST_DOCKER_MONGODB_URI: mongodb://mongod:27017/notesTest?replicaSet=rs0&directConnection=true
  TEST_DOCKER_DYNAMODB_ENDPOINT: http://dynamodb-local:8000
  TEST_MONGODB_TIER: enterprise
  TEST_DEBUG_FORMAT: object

  NODE_VERSION: 22.x

jobs:
  build:
    name: Generate GraphQL code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Clean install
        run: npm ci

      # Artifact packages/api/src/graphql/domains/*.generated.ts
      - name: Api GraphQL codegen
        run: npm run -w api graphql:gen

      # Artifact packages/app/src/__generated__/**
      - name: App GraphQL codegen and extract possible types from Api
        run: npm run -w app graphql:gen

      # Artifact packages/api/out/**
      - name: Build api
        run: npm run -w api build

      # Artifact packages/app/out/**
      - name: Build app
        run: npm run -w app build

      # Artifact packages/api-dev-server/out/**
      - name: Build dev server for testing
        run: npm run -w dev-server build

      - name: Upload GraphQL codegen artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build
          # Common path ancestor ./packages/
          path: |
            packages/api/src/graphql/domains/*.generated.ts
            packages/api/out/**
            packages/api-dev-server/out/**
            packages/app/src/__generated__/**
            packages/app/out/**
          retention-days: 2
